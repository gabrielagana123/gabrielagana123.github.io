<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Message Sent</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        font-family: 'Inter', sans-serif;
        background: #0b0f19;
        color: #e2e8f0;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        text-align: center;
    }

    .container {
        max-width: 500px;
        padding: 40px;
    }

    /* Loader Circle */
    .loader {
        width: 80px;
        height: 80px;
        border: 5px solid rgba(255,255,255,0.1);
        border-top: 5px solid #22c55e;
        border-radius: 50%;
        margin: 0 auto 20px;
        animation: spin 1s linear infinite;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    /* Checkmark Circle */
    .checkmark {
        display: none;
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: #22c55e;
        margin: 0 auto 20px;
        position: relative;
    }

    .checkmark::after {
        content: '';
        position: absolute;
        left: 22px;
        top: 38px;
        width: 20px;
        height: 10px;
        border-left: 4px solid white;
        border-bottom: 4px solid white;
        transform: rotate(-45deg);
    }

    h1 {
        font-size: 1.8rem;
        margin-bottom: 10px;
    }

    p {
        color: #94a3b8;
        margin-bottom: 30px;
    }

    .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 12px 20px;
        background: linear-gradient(135deg, #22c55e, #16a34a);
        color: white;
        text-decoration: none;
        border-radius: 8px;
        font-weight: 500;
        transition: 0.3s ease;
    }

    .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(34,197,94,0.3);
    }

    .icon {
        display: inline-block;
        width: 18px;
        height: 18px;
        border: 2px solid white;
        border-radius: 50%;
        position: relative;
    }

    .icon::after {
        content: '';
        position: absolute;
        left: 4px;
        top: 4px;
        width: 6px;
        height: 6px;
        border-left: 2px solid white;
        border-bottom: 2px solid white;
        transform: rotate(45deg);
    }
</style>
</head>

<body>

<div class="container">

    <!-- Loader -->
    <div class="loader" id="loader"></div>

    <!-- Success Check -->
    <div class="checkmark" id="checkmark"></div>

    <h1 id="title">Sending message...</h1>
    <p id="text">Please wait while we process your request.</p>

    <a href="/" class="btn" id="backBtn" style="display:none;">
        <span class="icon"></span>
        Back to Portfolio
    </a>

</div>

<script>
    // Simulate loading → success transition
    setTimeout(() => {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('checkmark').style.display = 'block';

        document.getElementById('title').innerText = "Message Sent Successfully";
        document.getElementById('text').innerText = "Thanks for reaching out. I’ll get back to you as soon as possible.";

        document.getElementById('backBtn').style.display = 'inline-flex';
    }, 1500);
</script>

</body>
</html>
